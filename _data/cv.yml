        details: 模拟电子技术基础 A 98、数字电子技术基础 A 97、信号与系统 A（双语）97、微控制器原理及应用 A 94、电磁场 93、电路原理 A 93、电力系统基础 92、电力电子学 A 91。

    论文与研究:
      - company: 3D-Printed Mechanical Filtering Shoes for Hybrid Self-Supervised Gait Analysis
        position: 第一作者
        location: 南京师范大学
        start_date: 2025
        end_date: 至今
        summary: 面向可穿戴步态分析，设计 3D 打印机械滤波传感鞋，并结合 ZUPT 物理模型、自监督残差网络与个性化少样本校准，实现实时步态参数估计。论文目前处于 IEEE Sensors Journal 一审返修阶段，通讯作者为施建平教授。
        highlights:
          - 参与传感鞋系统方案设计、实验流程、数据处理、算法验证与论文写作。
          - 实验结果显示，嵌入式结构提升了步间信号一致性，个性化方法降低了步长和步态时相估计误差。
          - 介绍网页：[南京师范大学电气与自动化工程学院新闻](https://eae.njnu.edu.cn/info/1051/1874.htm)。
      - company: Dynamic Analysis, FPGA Implementation and Application of Memristive Hopfield Neural Network with Synapse Crosstalk
        position: 第二作者
        start_date: 2025
        end_date: 2025
        summary: 论文发表于 Electronics, 14(12), 2464，DOI：10.3390/electronics14122464。围绕含突触串扰的忆阻 Hopfield 神经网络开展动力学分析、FPGA 实现与图像加密应用研究，通讯作者为闵富红教授。
        highlights:
          - 作者：Minghao Shan, Yuyao Yang, Qianyi Tang, Xintong Hu and Fuhong Min。
          - 研究验证了 MHNN 的复杂动力学行为，并通过模拟电路与 FPGA 实现验证模型可行性。

    竞赛与获奖:
      - title: 第十七届全国大学生数学竞赛（非数学 A 类）一等奖
        date: 2025
        awarder: 中国数学会
        summary: 在非数学 A 类竞赛中获一等奖，体现了较好的高等数学基础、逻辑推导能力和工程问题抽象能力。
        image: /assets/img/awards/math-competition-award.jpg
      - title: 第十六届蓝桥杯全国软件和信息技术专业人才大赛全国总决赛单片机设计与开发大学组二等奖
        date: 2025-06-23
        awarder: 工业和信息化部人才交流中心、蓝桥杯大赛组委会
        summary: 在单片机设计与开发方向获得全国总决赛二等奖，侧重嵌入式系统设计、程序开发、硬件接口理解与现场问题解决能力。
        image: /assets/img/awards/lanqiao-cup-award.jpg

    项目经历:
