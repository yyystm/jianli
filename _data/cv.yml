        summary: 国家级大学生创新创业训练计划项目，围绕双阻态忆阻 Hopfield 神经网络的建模、FPGA 部署与应用验证开展研究，我担任第二负责人。
        highlights:
          - 指导老师：闵富红教授。
          - 工作内容涵盖忆阻神经网络建模、FPGA 实现、系统验证与应用展示。
          - 介绍网页：[南京师范大学电气与自动化工程学院新闻](https://eae.njnu.edu.cn/info/1051/1866.htm)。
