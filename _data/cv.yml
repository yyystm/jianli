  summary: 南京师范大学电气工程及其自动化专业本科生，关注工程实践、智能系统和应用型研究。目前以第一作者身份完成一篇步态分析与 3D 打印传感鞋相关论文，处于一审返修阶段；另有一篇忆阻 Hopfield 神经网络与 FPGA 实现方向二作论文发表于 Electronics。

  social_networks: []

