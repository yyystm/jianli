  summary: 南京师范大学电气工程及其自动化专业本科生，关注智能系统、嵌入式实现与应用型研究。当前平均学分成绩 90.91，平均学分绩点 4.09，绩点排名 8/261，已通过大学英语六级（452 分）。目前以第一作者身份完成一篇步态分析与 3D 打印传感鞋相关论文，处于一审返修阶段；另有一篇忆阻 Hopfield 神经网络与 FPGA 实现方向二作论文发表于 Electronics，并参与国家级大学生创新创业训练计划项目。

  social_networks: []

