      - company: 3D-Printed Mechanical Filtering Shoes for Hybrid Self-Supervised Gait Analysis
        position: 第一作者
        location: 南京师范大学
        start_date: 2025
        end_date: 至今
        summary: 面向可穿戴步态分析，设计 3D 打印机械滤波传感鞋，并结合 ZUPT 物理模型、自监督残差网络与个性化少样本校准，实现实时步态参数估计。论文目前已进入 IEEE Sensors Journal 二审阶段，通讯作者为[施建平教授](https://eae.njnu.edu.cn/info/1051/1874.htm)。
