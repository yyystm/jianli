    项目经历:
      - name: 基于 IMU 和 3D 打印的步态解算与智能矫正系统
        summary: 面向可穿戴步态分析，设计集成 IMU 的 3D 打印机械滤波传感鞋，并构建“嵌入式采集 + BLE 传输 + 个性化步态解算 + 移动端展示 + 云端分析”的完整系统。我担任主要负责人。
        highlights:
          - 硬件与通信：以 ESP32-S3 为主控，实现 IMU 数据采集与 BLE 低功耗无线传输。
          - 算法：融合传统 ZUPT 与自监督残差网络，支持少样本个性化校准，可实时估计步长、足高、站立/摆动相等 10 余项参数。
          - 应用落地：基于 Flutter 开发移动端 APP，通过 BLE 与硬件通信，并接入大模型 API 对采集数据进行分析与反馈。
          - 云端部署：基于阿里云 ECS 搭建后端与数据库，记录步态数据，并部署模型用于身高、体重及行走地形反推。
          - 项目成果：第一作者论文《3D-Printed Mechanical Filtering Shoes for Hybrid Self-Supervised Gait Analysis》已进入 IEEE Sensors Journal 二审阶段，相关专利已提交，基于该项目的全国大学生计算机设计大赛已进入江苏省决赛。
        start_date: 2025-10
        end_date: 至今
      - name: 基于双阻态耦合忆阻 Hopfield 神经网络的 FPGA 实现及其应用
        summary: 国家级大学生创新创业训练计划项目，围绕 DMHNN 建模、混沌动力学分析、模拟电路与 FPGA 协同验证以及图像加密应用开展研究，我担任第二负责人。
        highlights:
          - 指导老师：[闵富红教授](https://eae.njnu.edu.cn/info/1051/1866.htm)。
          - 负责 MHNN 模型的模拟电路推导与 Multisim 仿真验证，完成忆阻突触串扰模块、双曲正切函数模块及主电路的等效设计。
          - 通过 x-y、y-z 相平面输出波形仿真，验证模拟电路输出与数值仿真的一致性。
          - 项目成果：第二作者 SCI 论文《Dynamic Analysis, FPGA Implementation and Application of Memristive Hopfield Neural Network with Synapse Crosstalk》发表于 Electronics。
        url: https://eae.njnu.edu.cn/info/1051/1866.htm
        start_date: 2024-12
        end_date: 2026-05

