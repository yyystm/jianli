        studyType: 本科
        start_date: 2022
        end_date: 至今
        highlights:
          - 本科阶段学习电气工程及其自动化相关课程，已修总学分 132。
          - 课程基础覆盖电路、模拟电子、数字电子、信号与系统、自动控制、电机学、电力系统、微控制器等方向。

