        end_date: 至今
        highlights:
          - 本科阶段学习电气工程及其自动化相关课程。
          - 可填写课程设计、科研训练或学生工作经历。

    论文与研究:
      - company: 3D-Printed Mechanical Filtering Shoes for Hybrid Self-Supervised Gait Analysis
        position: 第一作者
        location: 南京师范大学
        start_date: 2025
        end_date: 至今
        summary: 面向可穿戴步态分析，设计 3D 打印机械滤波传感鞋，并结合 ZUPT 物理模型、自监督残差网络与个性化少样本校准，实现实时步态参数估计。论文目前处于 IEEE Sensors Journal 一审返修阶段。
        highlights:
          - 参与传感鞋系统方案设计、实验流程、数据处理、算法验证与论文写作。
          - 实验结果显示，嵌入式结构提升了步间信号一致性，个性化方法降低了步长和步态时相估计误差。
      - company: Dynamic Analysis, FPGA Implementation and Application of Memristive Hopfield Neural Network with Synapse Crosstalk
        position: 第二作者
        start_date: 2025
        end_date: 2025
        summary: 论文发表于 Electronics, 14(12), 2464，DOI：10.3390/electronics14122464。围绕含突触串扰的忆阻 Hopfield 神经网络开展动力学分析、FPGA 实现与图像加密应用研究。
        highlights:
          - 作者：Minghao Shan, Yuyao Yang, Qianyi Tang, Xintong Hu and Fuhong Min。
          - 研究验证了 MHNN 的复杂动力学行为，并通过模拟电路与 FPGA 实现验证模型可行性。

